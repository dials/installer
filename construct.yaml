{% set version = environ.get("DIALS_VERSION", "3.29.0") %}
name: DIALS
version: "{{ version }}"
channels:
  - "https://conda.anaconda.org/conda-forge/"
license_file: LICENSE
welcome_image: dials_logo.png
header_image: dials_logo.png
icon_image: dials_logo.png
post_install: post.sh  # [unix]
post_install: post.bat # [win]
default_prefix: "$HOME/dials/v{{ version }}"  # [unix]
installer_type: all
specs:
  - dials =={{ version }}
  - xia2
